name: Build Debug APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK platforms
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-37.0" "build-tools;35.0.0"
          ln -sf $ANDROID_SDK_ROOT/platforms/android-37.0 $ANDROID_SDK_ROOT/platforms/android-37 || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
          add-job-summary-as-pr-comment: always

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: ./release

      - name: Get version info
        id: version
        run: |
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.date }}-${{ steps.version.outputs.sha_short }}
          name: "KernelSU Miuix ${{ steps.version.outputs.date }}"
          body: |
            ## KernelSU Miuix
            
            基于 [compose-miuix-ui/miuix](https://github.com/compose-miuix-ui/miuix) 设计语言构建的 KernelSU 管理应用。
            
            ### 功能
            - **首页**: KernelSU 状态检测、设备信息、快捷操作（重启/Respring/清缓存）
            - **应用管理**: 应用列表搜索过滤、强制停止、清除数据
            - **Root 终端**: root shell 命令执行、快捷命令、历史记录
            
            ### 构建
            - Commit: `${{ github.sha }}`
            - 触发: `${{ github.event_name }}`
            - 时间: `${{ steps.version.outputs.date }}`
            
            > 此为 Debug 构建产物，仅供测试使用。
          files: ./release/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
